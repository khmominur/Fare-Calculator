<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Alert</title>
  <style>
    body {
      background: black;
      color: lime;
      font-family: monospace;
      text-align: center;
      padding-top: 100px;
    }
    #text {
      font-size: 20px;
    }
    .blink {
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% {opacity: 1;}
      50% {opacity: 0;}
      100% {opacity: 1;}
    }
  </style>
</head>
<body>

<h1 class="blink">⚠ SYSTEM BREACH DETECTED ⚠</h1>
<p id="text"></p>

<script>
  const messages = [
    "Accessing your files...",
    "Downloading personal data...",
    "Sending to server...",
    "Installing malware...",
    "Installing malware...",
    "Installing malware...",    
    "Camera access granted...",
    "Recording started...",
    "ভয় পাইছেন ভাই ? "
  ];

  let i = 0;
  function showMessage() {
    if (i < messages.length) {
      document.getElementById("text").innerHTML = messages[i];
      i++;
      setTimeout(showMessage, 1500);
    } else {
      document.body.style.background = "white";
      document.body.style.color = "black";
      document.body.innerHTML = "<h1>😂 😂 😂</h1><p>Now go back to work 😎</p>";
    }
  }

  showMessage();
</script>

</body>
</html>
