<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Fare Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('04.jpg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            position: relative;
        }

        .card {
            background: #ffffff;
            padding: 30px 40px;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            color: #2a5298;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .input-group label {
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        /* IATA Help Button */
        .info-btn {
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .info-btn:hover {
            background: #ff9800;
            transform: scale(1.1);
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            outline: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 2;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2a5298;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #1e3c72;
        }

        /* Reset Button Style */
        .btn-reset {
            flex: 1;
            background: #e74c3c;
        }

        .btn-reset:hover {
            background: #c0392b;
        }

        .results {
            margin-top: 20px;
            padding: 15px;
            background: #f4f6f9;
            border-radius: 10px;
            border-left: 5px solid #2a5298;
        }

        .results p {
            margin: 8px 0;
            font-weight: 600;
            color: #333;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #222;
            color: white;
            text-align: center;
            padding: 12px 0;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Fare Calculator</h2>

    <div class="input-group">
        <label>Gross Fare</label>
        <input type="number" id="gross_fare" placeholder="Enter Gross Fare">
    </div>

    <div class="input-group">
        <label>Base Fare</label>
        <input type="number" id="base_fare" placeholder="Enter Base Fare">
    </div>

    <div class="input-group">
        <div class="label-container">
            <label>IATA Commission (%)</label>
            <a href="https://raw.githubusercontent.com/khmominur/Fare-Calculator/refs/heads/main/Commission.jpeg" target="_blank" class="info-btn" title="Click to see info">?</a>
        </div>
        <input type="number" id="iata_com" placeholder="Enter Commission %">
    </div>

    <div class="input-group">
        <label>Markup Amount</label>
        <input type="number" id="markup_amount" placeholder="Optional">
    </div>

    <div class="button-group">
        <button class="btn" onclick="calculateFare()">Calculate</button>
        <button class="btn btn-reset" onclick="resetForm()">Reset</button>
    </div>

    <div class="results" id="results" style="display:none;">
        <p id="ait"></p>
        <p id="iata"></p>
        <p id="net"></p>
    </div>
</div>

<div class="footer">
    © Copyright 2026 | Created by Mominur Rahman
</div>

<script>
    function calculateFare() {
        let gross_fare = parseFloat(document.getElementById('gross_fare').value);
        let base_fare = parseFloat(document.getElementById('base_fare').value);
        let iata_com = parseFloat(document.getElementById('iata_com').value);
        
        let markup_input = document.getElementById('markup_amount').value;
        let markup = markup_input === "" ? 0 : parseFloat(markup_input);

        if (isNaN(gross_fare) || isNaN(base_fare) || isNaN(iata_com)) {
            alert("Please enter Gross Fare, Base Fare and Commission.");
            return;
        }

        let AIT = (gross_fare * 0.3) / 100;
        let IATA_Commission = (base_fare * iata_com) / 100;
        let net_fare = (gross_fare + AIT - IATA_Commission) + markup;

        document.getElementById('ait').innerText = "AIT (0.3%): " + AIT.toFixed(2);
        document.getElementById('iata').innerText = "IATA Commission: " + IATA_Commission.toFixed(2);
        document.getElementById('net').innerText = "Net Fare: " + net_fare.toFixed(2);

        document.getElementById('results').style.display = "block";
    }

    function resetForm() {
        // সব ইনপুট ক্লিয়ার করা
        document.getElementById('gross_fare').value = "";
        document.getElementById('base_fare').value = "";
        document.getElementById('iata_com').value = "";
        document.getElementById('markup_amount').value = "";
        
        // রেজাল্ট সেকশন হাইড করা
        document.getElementById('results').style.display = "none";
    }
</script>

</body>
</html>
